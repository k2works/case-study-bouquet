<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>ログイン - フレール・メモワール</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
</head>
<body>
<div class="container mt-5">
    <h1>ログイン</h1>

    <div th:if="${param.registered}" class="alert alert-success" role="alert">
        会員登録が完了しました。ログインしてください。
    </div>

    <div th:if="${param.error}" class="alert alert-danger" role="alert">
        メールアドレスまたはパスワードが正しくありません。
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">メールアドレス</label>
            <input type="email" class="form-control" id="username" name="username" required/>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">パスワード</label>
            <input type="password" class="form-control" id="password" name="password" required/>
        </div>
        <button type="submit" class="btn btn-primary">ログイン</button>
    </form>

    <p class="mt-3">アカウントをお持ちでない方は <a th:href="@{/register}">会員登録</a></p>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
