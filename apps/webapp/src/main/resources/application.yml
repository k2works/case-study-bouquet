spring:
  datasource:
    url: jdbc:h2:mem:frere;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.frere.domain.model
  configuration:
    map-underscore-to-camel-case: true
